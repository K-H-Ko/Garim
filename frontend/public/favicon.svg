<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9747ff" />
      <stop offset="100%" stop-color="#1976d2" />
    </linearGradient>
  </defs>
  <!-- Focus brackets -->
  <path d="M25 15 L15 15 L15 25" fill="none" stroke="#1976d2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M75 15 L85 15 L85 25" fill="none" stroke="#1976d2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M25 85 L15 85 L15 75" fill="none" stroke="#1976d2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M75 85 L85 85 L85 75" fill="none" stroke="#1976d2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Outer Eye -->
  <path d="M15 50 C30 25 70 25 85 50 C70 75 30 75 15 50 Z" fill="none" stroke="url(#lensGrad)" stroke-width="6" stroke-linejoin="round" />
  
  <!-- Blocky Pupil representing privacy/masking -->
  <rect x="40" y="40" width="20" height="20" fill="#9747ff" rx="4" />
  <rect x="45" y="45" width="10" height="10" fill="#fff" rx="2" />
</svg>
