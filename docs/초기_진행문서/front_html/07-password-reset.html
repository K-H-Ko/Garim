<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>비밀번호 재설정 · Garim</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="garim.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<style>
  .auth-card { width: 480px; background: #fff; border-radius: 4px; box-shadow: var(--mui-elev-2); padding: 40px; }
  .auth-card h1 { font: 500 24px var(--font-sans); margin: 0 0 8px; }
  .auth-card .sub { font: 400 14px/1.5 var(--font-sans); color: var(--fg-2); margin-bottom: 32px; }
  .step-pills { display: flex; gap: 8px; margin-bottom: 32px; align-items: center; }
  .step-pill { display: flex; align-items: center; gap: 8px; font: 400 13px var(--font-sans); color: var(--fg-3); }
  .step-pill .num { width: 24px; height: 24px; border-radius: 50%; background: var(--mui-border); color: #fff; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; justify-content: center; }
  .step-pill.active { color: #1976d2; font-weight: 500; }
  .step-pill.active .num { background: #1976d2; }
  .step-pill.done { color: #2e7d32; }
  .step-pill.done .num { background: #2e7d32; }
  .step-pill.done .num::before { content: "✓"; }
  .step-pill.done .num span { display: none; }
  .step-dash { width: 16px; height: 1px; background: var(--mui-border); }
  .form-fields { display: flex; flex-direction: column; gap: 16px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .footer-link { text-align: center; margin-top: 24px; font: 400 14px var(--font-sans); color: var(--fg-2); }
  .footer-link a { color: #1976d2; font-weight: 500; }
  .resend { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; font: 400 13px var(--font-sans); color: var(--fg-2); }
  .resend button { background: transparent; border: none; color: #1976d2; cursor: pointer; font: 500 13px var(--font-sans); }
  .resend button:disabled { color: var(--fg-3); cursor: not-allowed; }
  .pwd-wrap { position: relative; }
  .pwd-wrap .toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; color: var(--fg-2); width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
  .strength { display: flex; gap: 4px; margin-top: 8px; }
  .strength .bar { flex: 1; height: 4px; border-radius: 2px; background: var(--mui-divider); }
  .strength.s1 .bar:nth-child(1) { background: #d32f2f; }
  .strength.s2 .bar:nth-child(-n+2) { background: #ed6c02; }
  .strength.s3 .bar:nth-child(-n+3) { background: #f9a825; }
  .strength.s4 .bar { background: #2e7d32; }
</style>
</head>
<body class="page-auth" data-screen-label="07 Password reset">
<div id="header"></div>

<main class="auth-main">
  <div class="auth-card">
    <h1>비밀번호 재설정</h1>
    <p class="sub">가입하신 이메일로 재설정 링크를 보내드립니다.</p>

    <div class="step-pills">
      <div class="step-pill active" id="pill-1"><span class="num"><span>1</span></span>이메일</div>
      <span class="step-dash"></span>
      <div class="step-pill" id="pill-2"><span class="num"><span>2</span></span>발송 확인</div>
      <span class="step-dash"></span>
      <div class="step-pill" id="pill-3"><span class="num"><span>3</span></span>새 비밀번호</div>
    </div>

    <!-- Step 1 -->
    <div class="panel active" id="panel-1">
      <form id="form-1" class="form-fields" novalidate>
        <div class="mui-field">
          <input type="email" class="mui-input" id="reset-email" placeholder="가입한 이메일" autocomplete="email" required>
          <span class="mui-field__helper" id="h-reset-email">계정에 등록된 이메일을 입력해주세요.</span>
        </div>
        <button type="submit" class="mui-btn mui-btn--contained mui-btn--lg mui-btn--block" id="submit-1" disabled style="margin-top:8px;">
          재설정 메일 보내기
        </button>
      </form>
      <div class="footer-link"><a href="06-login.html">← 로그인으로 돌아가기</a></div>
    </div>

    <!-- Step 2 -->
    <div class="panel" id="panel-2">
      <div class="mui-alert mui-alert--info" style="margin-bottom:24px;">
        <span class="material-icons">mail</span>
        <div class="mui-alert__body">
          <strong id="email-mask">t***@gmail.com</strong> 으로 재설정 링크를 보냈습니다.<br>
          메일함을 확인하고 링크를 클릭해주세요. 링크는 1시간 동안 유효합니다.
        </div>
      </div>
      <div class="caption-k" style="font-size:13px;">메일이 도착하지 않았나요? 스팸함을 확인해보시고, 그래도 없으면 다시 보내드릴게요.</div>
      <div class="resend">
        <span>남은 재전송 시간 <strong id="countdown">60</strong>초</span>
        <button id="resend-btn" disabled>재전송</button>
      </div>
      <button class="mui-btn mui-btn--text mui-btn--block" style="margin-top:24px;" id="simulate-link">데모: 이메일 링크 클릭한 것처럼 진행 →</button>
    </div>

    <!-- Step 3 -->
    <div class="panel" id="panel-3">
      <form id="form-3" class="form-fields" novalidate>
        <div class="mui-field">
          <div class="pwd-wrap">
            <input type="password" class="mui-input" id="new-pwd" placeholder="새 비밀번호" autocomplete="new-password" required>
            <button type="button" class="toggle" id="new-pwd-toggle" tabindex="-1"><span class="material-icons" style="font-size:20px;">visibility</span></button>
          </div>
          <div class="strength" id="strength"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
          <span class="mui-field__helper" id="h-new-pwd">영문·숫자·특수문자 포함 8자 이상</span>
        </div>
        <div class="mui-field">
          <input type="password" class="mui-input" id="new-pwd2" placeholder="비밀번호 확인" autocomplete="new-password" required>
          <span class="mui-field__helper" id="h-new-pwd2">동일한 비밀번호를 다시 한 번 입력해주세요.</span>
        </div>
        <button type="submit" class="mui-btn mui-btn--contained mui-btn--lg mui-btn--block" id="submit-3" disabled style="margin-top:8px;">
          비밀번호 변경
        </button>
      </form>
    </div>
  </div>
</main>

<div id="footer"></div>

<script src="garim-chrome.js"></script>
<script>
  document.getElementById('header').innerHTML = gh({ variant: 'minimal' });
  document.getElementById('footer').innerHTML = gf({ minimal: true });

  function goStep(n) {
    document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === n - 1));
    document.querySelectorAll('.step-pill').forEach((p, i) => {
      p.classList.toggle('active', i === n - 1);
      p.classList.toggle('done', i < n - 1);
    });
  }

  // Step 1
  const resetEmail = document.getElementById('reset-email');
  const submit1 = document.getElementById('submit-1');
  resetEmail.addEventListener('input', () => {
    const v = resetEmail.value.trim();
    submit1.disabled = !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  });
  document.getElementById('form-1').addEventListener('submit', (e) => {
    e.preventDefault();
    const v = resetEmail.value.trim();
    const [name, domain] = v.split('@');
    document.getElementById('email-mask').textContent = name[0] + '***@' + domain;
    goStep(2);
    startCountdown();
  });

  // Step 2 countdown
  let timer = null;
  function startCountdown() {
    let n = 60;
    document.getElementById('countdown').textContent = n;
    document.getElementById('resend-btn').disabled = true;
    clearInterval(timer);
    timer = setInterval(() => {
      n--;
      document.getElementById('countdown').textContent = n;
      if (n <= 0) {
        clearInterval(timer);
        document.getElementById('resend-btn').disabled = false;
        document.querySelector('.resend span').innerHTML = '재전송 가능';
      }
    }, 1000);
  }
  document.getElementById('resend-btn').addEventListener('click', startCountdown);
  document.getElementById('simulate-link').addEventListener('click', () => goStep(3));

  // Step 3
  const newPwd = document.getElementById('new-pwd');
  const newPwd2 = document.getElementById('new-pwd2');
  const submit3 = document.getElementById('submit-3');
  const strength = document.getElementById('strength');
  const hNewPwd = document.getElementById('h-new-pwd');
  const hNewPwd2 = document.getElementById('h-new-pwd2');
  function pwdStrength(p) {
    if (!p) return 0;
    let s = 0;
    if (p.length >= 8) s++;
    if (/[A-Za-z]/.test(p) && /[0-9]/.test(p)) s++;
    if (/[^A-Za-z0-9]/.test(p)) s++;
    if (p.length >= 12) s++;
    return s;
  }
  function validate3() {
    const s = pwdStrength(newPwd.value);
    strength.className = 'strength s' + s;
    const okPwd = s >= 2 && newPwd.value.length >= 8;
    const okMatch = newPwd2.value && newPwd.value === newPwd2.value;
    hNewPwd.textContent = okPwd ? '좋은 비밀번호입니다.' : '영문·숫자·특수문자 포함 8자 이상';
    hNewPwd.className = 'mui-field__helper' + (okPwd ? ' mui-field__helper--success' : '');
    if (newPwd2.value) {
      hNewPwd2.textContent = okMatch ? '일치합니다.' : '비밀번호가 일치하지 않습니다.';
      hNewPwd2.className = 'mui-field__helper' + (okMatch ? ' mui-field__helper--success' : ' mui-field__helper--error');
    }
    submit3.disabled = !(okPwd && okMatch);
  }
  newPwd.addEventListener('input', validate3);
  newPwd2.addEventListener('input', validate3);
  document.getElementById('new-pwd-toggle').addEventListener('click', () => {
    const t = newPwd.type === 'password' ? 'text' : 'password';
    newPwd.type = t;
    document.querySelector('#new-pwd-toggle span').textContent = t === 'password' ? 'visibility' : 'visibility_off';
  });
  document.getElementById('form-3').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('비밀번호가 변경되었습니다. 로그인 페이지로 이동합니다.');
    window.location.href = '06-login.html';
  });
</script>
</body></html>
