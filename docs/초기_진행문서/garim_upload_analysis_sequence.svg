<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1720" viewBox="0 0 1500 1720" role="img" aria-labelledby="title desc">
  <title id="title">GARIM Upload and Analysis Sequence</title>
  <desc id="desc">Sequence diagram for GARIM upload, backend job creation, Colab worker polling, pipeline analysis, progress reporting, and frontend completion display.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .actor { stroke-width: 2; rx: 10; }
      .actor-user { fill: #e0f2fe; stroke: #0284c7; }
      .actor-fe { fill: #dbeafe; stroke: #2563eb; }
      .actor-be { fill: #dcfce7; stroke: #16a34a; }
      .actor-db { fill: #ede9fe; stroke: #7c3aed; }
      .actor-fs { fill: #f1f5f9; stroke: #475569; }
      .actor-worker { fill: #fef3c7; stroke: #d97706; }
      .actor-pipe { fill: #ffedd5; stroke: #ea580c; }
      .actor-title { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; }
      .msg { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .return { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow-muted); stroke-dasharray: 7 5; }
      .msg-text { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .note-text { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .phase { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .phase-title { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="1720"/>
  <text class="title" x="70" y="58">GARIM Upload and Analysis Sequence</text>
  <text class="subtitle" x="70" y="88">프론트 업로드 → 백엔드 job 생성 → Colab worker 분석 → 진행률/결과 표시 흐름</text>

  <rect class="actor actor-user" x="70" y="130" width="130" height="58"/>
  <text class="actor-title" x="135" y="165">User</text>

  <rect class="actor actor-fe" x="255" y="130" width="155" height="58"/>
  <text class="actor-title" x="332" y="165">React Frontend</text>

  <rect class="actor actor-be" x="470" y="130" width="165" height="58"/>
  <text class="actor-title" x="552" y="165">FastAPI Backend</text>

  <rect class="actor actor-db" x="700" y="130" width="145" height="58"/>
  <text class="actor-title" x="772" y="165">PostgreSQL</text>

  <rect class="actor actor-fs" x="910" y="130" width="145" height="58"/>
  <text class="actor-title" x="982" y="165">File Storage</text>

  <rect class="actor actor-worker" x="1120" y="130" width="150" height="58"/>
  <text class="actor-title" x="1195" y="165">Colab Worker</text>

  <rect class="actor actor-pipe" x="1320" y="130" width="130" height="58"/>
  <text class="actor-title" x="1385" y="165">Pipeline</text>

  <line class="life" x1="135" y1="188" x2="135" y2="1655"/>
  <line class="life" x1="332" y1="188" x2="332" y2="1655"/>
  <line class="life" x1="552" y1="188" x2="552" y2="1655"/>
  <line class="life" x1="772" y1="188" x2="772" y2="1655"/>
  <line class="life" x1="982" y1="188" x2="982" y2="1655"/>
  <line class="life" x1="1195" y1="188" x2="1195" y2="1655"/>
  <line class="life" x1="1385" y1="188" x2="1385" y2="1655"/>

  <rect class="phase" x="55" y="218" width="1390" height="42"/>
  <text class="phase-title" x="75" y="244">Phase 1. Login and Upload Start</text>

  <line class="msg" x1="135" y1="300" x2="332" y2="300"/>
  <text class="msg-text" x="158" y="288">영상 선택 후 분석 시작</text>

  <line class="msg" x1="332" y1="350" x2="552" y2="350"/>
  <text class="msg-text" x="365" y="338">POST /uploads/init</text>

  <line class="msg" x1="552" y1="400" x2="772" y2="400"/>
  <text class="msg-text" x="592" y="388">upload row 생성</text>

  <line class="return" x1="552" y1="450" x2="332" y2="450"/>
  <text class="msg-text" x="366" y="438">upload_id / chunk 정보</text>

  <rect class="phase" x="55" y="490" width="1390" height="42"/>
  <text class="phase-title" x="75" y="516">Phase 2. Chunk Upload and Job Creation</text>

  <line class="msg" x1="332" y1="570" x2="552" y2="570"/>
  <text class="msg-text" x="350" y="558">POST /uploads/{upload_id}/chunks</text>

  <line class="msg" x1="552" y1="620" x2="982" y2="620"/>
  <text class="msg-text" x="690" y="608">chunk 저장</text>

  <line class="msg" x1="552" y1="670" x2="772" y2="670"/>
  <text class="msg-text" x="590" y="658">업로드 진행 상태 갱신</text>

  <line class="return" x1="552" y1="720" x2="332" y2="720"/>
  <text class="msg-text" x="360" y="708">uploaded_chunks / progress</text>

  <line class="msg" x1="332" y1="770" x2="552" y2="770"/>
  <text class="msg-text" x="358" y="758">POST /uploads/{upload_id}/complete</text>

  <line class="msg" x1="552" y1="820" x2="982" y2="820"/>
  <text class="msg-text" x="680" y="808">chunk 병합 / 원본 파일 확정</text>

  <line class="msg" x1="552" y1="870" x2="772" y2="870"/>
  <text class="msg-text" x="585" y="858">analysis_jobs queued 생성</text>

  <line class="return" x1="552" y1="920" x2="332" y2="920"/>
  <text class="msg-text" x="395" y="908">job_id 반환</text>

  <rect class="phase" x="55" y="960" width="1390" height="42"/>
  <text class="phase-title" x="75" y="986">Phase 3. Worker Analysis and Progress Reporting</text>

  <line class="msg" x1="1195" y1="1040" x2="552" y2="1040"/>
  <text class="msg-text" x="760" y="1028">GET /worker/jobs/next</text>

  <line class="return" x1="552" y1="1088" x2="1195" y2="1088"/>
  <text class="msg-text" x="790" y="1076">queued job 정보 반환</text>

  <line class="msg" x1="1195" y1="1136" x2="552" y2="1136"/>
  <text class="msg-text" x="735" y="1124">POST /worker/jobs/{job_id}/accept</text>

  <line class="msg" x1="552" y1="1184" x2="772" y2="1184"/>
  <text class="msg-text" x="585" y="1172">job status = processing</text>

  <line class="msg" x1="1195" y1="1232" x2="552" y2="1232"/>
  <text class="msg-text" x="712" y="1220">GET /worker/files/{upload_id}/download</text>

  <line class="msg" x1="552" y1="1280" x2="982" y2="1280"/>
  <text class="msg-text" x="705" y="1268">원본 파일 읽기</text>

  <line class="return" x1="552" y1="1328" x2="1195" y2="1328"/>
  <text class="msg-text" x="805" y="1316">원본 영상 다운로드</text>

  <line class="msg" x1="1195" y1="1376" x2="1385" y2="1376"/>
  <text class="msg-text" x="1224" y="1364">STT / PII / Beep 실행</text>

  <rect class="note" x="70" y="1285" width="520" height="82"/>
  <text class="note-text" x="92" y="1313">프론트는 별도 polling으로 진행률을 계속 조회합니다.</text>
  <text class="note-text" x="92" y="1337">GET status/progress API → DB 조회 → 화면 갱신</text>

  <rect class="phase" x="55" y="1410" width="1390" height="42"/>
  <text class="phase-title" x="75" y="1436">Phase 4. Result Save and Completion</text>

  <line class="msg" x1="1385" y1="1468" x2="1195" y2="1468"/>
  <text class="msg-text" x="1238" y="1456">progress callback</text>

  <line class="msg" x1="1195" y1="1516" x2="552" y2="1516"/>
  <text class="msg-text" x="720" y="1504">PUT /worker/jobs/{job_id}/progress</text>

  <line class="msg" x1="552" y1="1564" x2="772" y2="1564"/>
  <text class="msg-text" x="596" y="1552">stage / total_progress 저장</text>

  <line class="msg" x1="1195" y1="1612" x2="552" y2="1612"/>
  <text class="msg-text" x="700" y="1600">POST results/stt, results/pii, results/artifact</text>

  <line class="msg" x1="1195" y1="1660" x2="552" y2="1660"/>
  <text class="msg-text" x="720" y="1648">POST /worker/jobs/{job_id}/complete</text>

  <line class="msg" x1="552" y1="1700" x2="772" y2="1700"/>
  <text class="msg-text" x="590" y="1688">job status = completed</text>

  <line class="return" x1="552" y1="1710" x2="332" y2="1710"/>
  <text class="msg-text" x="358" y="1698">완료 상태 / 결과 반환</text>
</svg>
