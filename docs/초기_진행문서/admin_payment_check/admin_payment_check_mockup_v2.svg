<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">GARIM 관리자 사용자 결제 확인 화면 목업 v2</title>
  <desc id="desc">상단 요약 카드와 하단 결제 목록/상세 패널은 유지하고 검색 영역을 기존 관리자 페이지 스타일에 맞춘 화면 목업</desc>
  <defs>
