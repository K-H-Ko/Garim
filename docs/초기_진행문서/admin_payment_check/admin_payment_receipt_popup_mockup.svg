<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">GARIM 관리자 결제 영수증 열기 화면 목업</title>
  <desc id="desc">사용자 결제 확인 화면에서 영수증 열기 버튼을 눌렀을 때 결제 영수증 팝업이 열리는 예상 화면</desc>
  <defs>
    <style>
