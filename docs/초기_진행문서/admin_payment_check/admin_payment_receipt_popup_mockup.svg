      .title { fill: #111827; font: 700 24px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .subtitle { fill: #64748b; font: 400 13px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .tabs-bg { fill: #fff; stroke: #d1d5db; stroke-width: 1; }
      .tab-active { fill: #1976d2; }
