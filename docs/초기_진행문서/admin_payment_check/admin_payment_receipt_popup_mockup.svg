      .outline { fill: #fff; stroke: #cbd5e1; stroke-width: 1; }
      .outline-text { fill: #334155; font: 700 11px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .receipt-title { fill: #111827; font: 900 22px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .receipt-label { fill: #64748b; font: 800 11px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
