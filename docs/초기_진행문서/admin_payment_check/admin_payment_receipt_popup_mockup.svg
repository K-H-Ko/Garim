      .metric-num { fill: #0f172a; font: 900 24px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .metric-sub { fill: #64748b; font: 600 11px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .btn { fill: #1976d2; }
      .btn-text { fill: #fff; font: 800 12px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .input { fill: #fff; stroke: #cfd6e1; stroke-width: 1; }
