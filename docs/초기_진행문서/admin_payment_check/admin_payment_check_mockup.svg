      .chip { font: 700 12px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .btn { fill: #1976d2; }
      .btn-text { fill: #fff; font: 700 13px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .outline-btn { fill: #fff; stroke: #d1d5db; stroke-width: 1; }
