      .side { fill: #1e1b3a; }
      .side-muted { fill: rgba(255,255,255,0.54); }
      .side-text { fill: rgba(255,255,255,0.86); font: 500 14px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .side-section { fill: rgba(255,255,255,0.48); font: 700 11px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; letter-spacing: 1px; }
      .active-fill { fill: rgba(149,117,205,0.24); }
      .active-text { fill: #c4b5fd; font: 700 14px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .title { fill: #111827; font: 700 30px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .subtitle { fill: #6b7280; font: 400 15px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .card { fill: #fff; stroke: #e5e7eb; stroke-width: 1; filter: url(#shadow); }
      .plain-card { fill: #fff; stroke: #e5e7eb; stroke-width: 1; }
      .metric-label { fill: #6b7280; font: 600 12px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; letter-spacing: .3px; }
      .metric-num { fill: #111827; font: 800 28px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .metric-sub { fill: #6b7280; font: 500 12px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .toolbar-label { fill: #374151; font: 600 13px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .input { fill: #fff; stroke: #d1d5db; stroke-width: 1; }
      .input-text { fill: #9ca3af; font: 500 13px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .table-head { fill: #f9fafb; }
      .th { fill: #6b7280; font: 800 12px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; letter-spacing: .5px; }
      .td { fill: #1f2937; font: 500 13px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
