      .detail-title { fill: #111827; font: 800 18px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .detail-label { fill: #6b7280; font: 600 12px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
      .detail-value { fill: #111827; font: 700 14px 'Pretendard', 'Noto Sans KR', Arial, sans-serif; }
