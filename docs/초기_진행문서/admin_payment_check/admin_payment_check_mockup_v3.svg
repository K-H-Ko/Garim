      .side-section { fill: rgba(255,255,255,0.5); font: 700 11px 'Pretendard','Noto Sans KR',Arial,sans-serif; letter-spacing: 1px; }
      .active-fill { fill: rgba(149,117,205,0.22); }
      .active-text { fill: #c4b5fd; font: 700 14px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .title { fill: #111827; font: 700 24px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .subtitle { fill: #64748b; font: 400 13px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
      .tabs-bg { fill: #fff; stroke: #d1d5db; stroke-width: 1; }
      .tab-active { fill: #1976d2; }
      .tab-active-text { fill: #fff; font: 700 12px 'Pretendard','Noto Sans KR',Arial,sans-serif; }
