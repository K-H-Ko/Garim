<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">GARIM 관리자 사용자 결제 확인 화면 목업 v3</title>
  <desc id="desc">정책 및 상품 관리 페이지와 같은 표/툴바 결을 유지한 사용자 결제 확인 화면 목업</desc>
  <defs>
